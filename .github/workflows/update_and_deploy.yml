name: Update data and deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *'  # 10:00 HKT daily

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  update_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Update data (WFS + HKMA PDF)
        run: |
          python scripts/update_data.py

      - name: Auto geocode new locations
        run: |
          python scripts/fill_missing_coords.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: auto update data and coords" || echo "No changes"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
